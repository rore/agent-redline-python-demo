name: agent-redline

# Push-driven flow: this branch demonstrates the push-mode CI shape.
# - Trigger fires on `push: branches: [main]` rather than `pull_request:`.
# - Verdict surfaces in $GITHUB_STEP_SUMMARY (run page, visible at the
#   top one click from the workflow-failure email).
# - The workflow fails on EXIT != 0 (both RED warnings and
#   BOUNDARY_VIOLATION hard fails), so GitHub's default
#   workflow-failure email notification fires for the user who
#   triggered the run. Other workflows in the repo are unaffected —
#   agent-redline is its own .github/workflows/ file.
# - --flow-mode push tells the reporter to render checkpoint text as
#   a review obligation on the commit (CODEOWNER / label satisfier
#   phrasing doesn't apply on a direct push).

on:
  # Push-driven flow demo: fires on push to the long-lived branch
  # (push-demo-main) AND on push to any push-demo-* scenario branch.
  # In a real push-driven repo, this would be `branches: [main]` only —
  # the multi-branch trigger here is a demo affordance so each scenario
  # branch (push-demo-blue-only, push-demo-red-zone-change, etc.) can
  # produce its own independent CI run when pushed.
  push:
    branches:
      - push-demo-main
      - 'push-demo-*'

permissions:
  contents: read

jobs:
  boundary:
    name: Boundary check (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run import-linter via adapter
        run: |
          mkdir -p build
          python scripts/run-import-linter.py --out build/import-linter-report.json
        # Exits 1 on violations; reporter step surfaces them. Drop this
        # once shadow window is done.
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: boundary-report
          path: build/import-linter-report.json
          if-no-files-found: error

  report:
    name: agent-redline report
    needs: boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: boundary-report
          path: build/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml jsonschema

      - name: Run reporter
        id: report
        # See extensions/python/scaffold.md §5b for the full rationale
        # behind the canonical pattern (set +e + EXIT capture +
        # GITHUB_OUTPUT publish + summary surface + enforce-on-non-zero).
        #
        # Push-mode-specific: BEFORE/AFTER diff handles "first push to a
        # branch" (BEFORE is all-zeros) and force-push (BEFORE may be a
        # SHA the runner doesn't have) by falling back to merge-base
        # against the demo's long-lived branch.
        run: |
          set +e
          mkdir -p build
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          # In a real push-mode setup, the long-lived branch is "main" and the
          # fallback would be `origin/main`. This demo lives alongside the PR-
          # mode demo on the same repo, so its long-lived branch is named
          # `push-demo-main` instead — the fallback chases that, then degrades
          # to AFTER^ if even that ref is not present.
          BASE_REF="origin/push-demo-main"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" || -z "$BEFORE" ]] || \
             ! git rev-parse --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
            BEFORE="$(git merge-base "$BASE_REF" "$AFTER" 2>/dev/null || echo "$AFTER^")"
          fi
          git diff --name-only "$BEFORE"..."$AFTER" > build/changed-files.txt
          # Per-file line counts so policy.excludes applies to prSize.
          git diff --numstat "$BEFORE"..."$AFTER" > build/lines-per-file.txt
          # `--unified=0` so the reporter can scan only added lines for
          # suppression markers (noqa, type: ignore, pyright: ignore,
          # etc.). Without this, suppressions in unchanged context would
          # be falsely attributed to this push.
          git diff --unified=0 "$BEFORE"..."$AFTER" > build/diff-unified.patch
          python scripts/agent-redline-report.py \
            --policy agent-policy.yaml \
            --flow-mode push \
            --changed-files build/changed-files.txt \
            --lines-per-file build/lines-per-file.txt \
            --diff-unified build/diff-unified.patch \
            --json-out build/verdict.json \
            --comment-out build/comment.md
          EXIT=$?
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          echo "--- verdict.json ---" && cat build/verdict.json
          echo "--- comment.md ---" && cat build/comment.md
          echo "reporter exit code: $EXIT"

      - name: Write verdict to job summary
        if: always()
        run: |
          {
            echo "## agent-redline verdict"
            echo
            cat build/comment.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-redline-verdict
          path: |
            build/verdict.json
            build/comment.md

      - name: Enforce reporter exit code
        # Push-mode: fail the agent-redline workflow on EXIT != 0 (both
        # RED warnings and BOUNDARY_VIOLATION hard fails). The red
        # badge on this commit's agent-redline run is the audit record;
        # GitHub's default email-on-failure summons the reviewer; other
        # workflows in this repo are unaffected.
        run: |
          EXIT="${{ steps.report.outputs.exit_code }}"
          if [[ "$EXIT" != "0" ]]; then
            echo "Reporter exited $EXIT. Failing the agent-redline workflow."
            echo "See the run summary above for the full verdict."
            exit 1
          fi
          echo "Reporter exited 0 — clean."
